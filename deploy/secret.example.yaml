# Shared basic-auth credential. Do NOT commit a real password.
# Create it imperatively instead, e.g.:
#
#   kubectl -n dev create secret generic dev-env-config-auth \
#     --from-literal=username=developer \
#     --from-literal=password="$(openssl rand -base64 24)"
#
# This file is only an illustration of the expected shape.
apiVersion: v1
kind: Secret
metadata:
  name: dev-env-config-auth
  namespace: dev
type: Opaque
stringData:
  username: developer
  password: CHANGE_ME
